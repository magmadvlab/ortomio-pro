<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Chiusura Modal Raccolto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
        }
        
        .modal-content {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 32rem;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .star {
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .star:hover {
            color: #fbbf24;
        }
        
        .star.active {
            color: #f59e0b;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Test Chiusura Modal Raccolto</h1>
        
        <button id="openModal" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
            Apri Modal Raccolto
        </button>
        
        <div id="status" class="mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">
            <p><strong>Status:</strong> Modal chiuso</p>
            <p><strong>Ultimo evento:</strong> Nessuno</p>
        </div>
    </div>

    <!-- Modal Raccolto -->
    <div id="harvestModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" onclick="event.stopPropagation();">
            <div class="flex items-center justify-between p-6 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-900">Nuovo Raccolto</h2>
                <button id="closeButton" class="text-gray-400 hover:text-gray-600 p-2 -m-2" aria-label="Chiudi modal">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <form id="harvestForm" class="p-6 space-y-6">
                <!-- Tipo di registrazione -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">
                        Tipo di registrazione
                    </label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="trackedOption" class="p-4 border-2 border-green-500 bg-green-50 rounded-lg text-left">
                            <div class="flex items-center gap-3 mb-2">
                                <svg class="text-green-600" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                                </svg>
                                <span class="font-medium">Coltura Tracciata</span>
                            </div>
                            <p class="text-sm text-gray-600">
                                Raccolto da piante che hai seminato/trapiantato
                            </p>
                        </button>
                        
                        <button type="button" id="manualOption" class="p-4 border-2 border-gray-200 hover:border-blue-300 rounded-lg text-left">
                            <div class="flex items-center gap-3 mb-2">
                                <svg class="text-blue-600" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                                </svg>
                                <span class="font-medium">Inserimento Manuale</span>
                            </div>
                            <p class="text-sm text-gray-600">
                                Raccolto non tracciato nel sistema
                            </p>
                        </button>
                    </div>
                </div>

                <!-- Pianta -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Pianta *
                    </label>
                    <input type="text" id="plantName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Nome della pianta" required>
                    <p class="text-xs text-gray-500 mt-1">
                        ⚠️ Questo raccolto non sarà collegato al sistema di tracciamento
                    </p>
                </div>

                <!-- Varietà -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Varietà
                    </label>
                    <input type="text" id="variety" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="Varietà (opzionale)">
                </div>

                <!-- Quantità e Unità -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Quantità *
                        </label>
                        <input type="number" id="quantity" step="0.1" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="0.0" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Unità *
                        </label>
                        <select id="unit" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                            <option value="kg">kg</option>
                            <option value="g">g</option>
                            <option value="pz">pz</option>
                            <option value="mazzi">mazzi</option>
                            <option value="cassette">cassette</option>
                            <option value="litri">litri</option>
                        </select>
                    </div>
                </div>

                <!-- Data Raccolto -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Data Raccolto *
                    </label>
                    <input type="date" id="harvestDate" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent" required>
                </div>

                <!-- Qualità -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Qualità
                    </label>
                    <div class="flex items-center gap-2">
                        <span class="star" data-rating="1">⭐</span>
                        <span class="star" data-rating="2">⭐</span>
                        <span class="star" data-rating="3">⭐</span>
                        <span class="star" data-rating="4">⭐</span>
                        <span class="star" data-rating="5">⭐</span>
                        <span id="ratingText" class="text-sm text-gray-600 ml-2"></span>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-3 pt-4">
                    <button type="button" id="cancelButton" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Annulla
                    </button>
                    <button type="submit" id="saveButton" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                        Salva
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('harvestModal');
        const openModalBtn = document.getElementById('openModal');
        const closeBtn = document.getElementById('closeButton');
        const cancelBtn = document.getElementById('cancelButton');
        const saveBtn = document.getElementById('saveButton');
        const form = document.getElementById('harvestForm');
        const status = document.getElementById('status');
        
        let currentRating = 0;

        function updateStatus(message, event = '') {
            status.innerHTML = `
                <p><strong>Status:</strong> ${message}</p>
                <p><strong>Ultimo evento:</strong> ${event}</p>
                <p><strong>Timestamp:</strong> ${new Date().toLocaleTimeString()}</p>
            `;
        }

        function openModal() {
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            updateStatus('Modal aperto', 'Apertura modal');
            
            // Imposta data di oggi
            document.getElementById('harvestDate').value = new Date().toISOString().split('T')[0];
        }

        function closeModal(reason = 'Chiusura generica') {
            modal.style.display = 'none';
            document.body.style.overflow = 'unset';
            updateStatus('Modal chiuso', reason);
            
            // Reset form
            form.reset();
            currentRating = 0;
            updateRatingDisplay();
        }

        function updateRatingDisplay() {
            const stars = document.querySelectorAll('.star');
            const ratingText = document.getElementById('ratingText');
            
            stars.forEach((star, index) => {
                if (index < currentRating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
            
            ratingText.textContent = currentRating > 0 ? `${currentRating}/5` : '';
        }

        // Event Listeners
        openModalBtn.addEventListener('click', (e) => {
            e.preventDefault();
            openModal();
        });

        closeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            closeModal('Click su pulsante X');
        });

        cancelBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            closeModal('Click su pulsante Annulla');
        });

        // Chiusura con click sull'overlay
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal('Click su overlay');
            }
        });

        // Chiusura con tasto ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.style.display === 'flex') {
                closeModal('Tasto ESC');
            }
        });

        // Gestione stelle qualità
        document.querySelectorAll('.star').forEach((star, index) => {
            star.addEventListener('click', (e) => {
                e.preventDefault();
                const rating = parseInt(star.dataset.rating);
                currentRating = currentRating === rating ? 0 : rating;
                updateRatingDisplay();
                updateStatus(`Modal aperto - Rating: ${currentRating}`, 'Selezione rating');
            });
        });

        // Gestione form submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            const formData = new FormData(form);
            const data = {
                plantName: document.getElementById('plantName').value,
                variety: document.getElementById('variety').value,
                quantity: document.getElementById('quantity').value,
                unit: document.getElementById('unit').value,
                harvestDate: document.getElementById('harvestDate').value,
                rating: currentRating
            };
            
            updateStatus('Modal aperto - Form inviato', `Dati: ${JSON.stringify(data)}`);
            
            // Simula salvataggio
            setTimeout(() => {
                closeModal('Form salvato con successo');
            }, 1000);
        });

        // Gestione opzioni tipo registrazione
        document.getElementById('trackedOption').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('trackedOption').className = 'p-4 border-2 border-green-500 bg-green-50 rounded-lg text-left';
            document.getElementById('manualOption').className = 'p-4 border-2 border-gray-200 hover:border-blue-300 rounded-lg text-left';
            updateStatus('Modal aperto - Modalità tracciata', 'Selezione tipo registrazione');
        });

        document.getElementById('manualOption').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('manualOption').className = 'p-4 border-2 border-blue-500 bg-blue-50 rounded-lg text-left';
            document.getElementById('trackedOption').className = 'p-4 border-2 border-gray-200 hover:border-green-300 rounded-lg text-left';
            updateStatus('Modal aperto - Modalità manuale', 'Selezione tipo registrazione');
        });

        // Inizializza
        updateStatus('Modal chiuso', 'Pagina caricata');
        updateRatingDisplay();
    </script>
</body>
</html>
