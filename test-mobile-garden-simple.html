<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Garden Layout Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for mobile tab navigation */
        .hide-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        /* Test viewport indicators */
        .viewport-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="viewport-indicator" id="viewportIndicator">
        Loading...
    </div>

    <!-- Simulated Garden Page Header -->
    <header class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-10">
        <div class="flex items-center justify-between mb-3">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-gray-900">🌱 Il Mio Orto</h1>
                <p class="text-sm text-gray-600">Orto di Casa</p>
            </div>
            
            <!-- Mobile: Responsive buttons -->
            <div class="flex gap-2 md:gap-3">
                <a href="#" class="px-3 py-2 text-sm border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-colors flex items-center gap-2 md:px-4 md:py-3 md:text-base">
                    <svg class="w-4 h-4 md:w-[18px] md:h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <span class="hidden sm:inline">Gestisci Orti</span>
                </a>
                <button class="px-3 py-2 bg-green-600 text-white rounded-lg font-medium hover:bg-green-700 transition-colors flex items-center gap-2 text-sm md:px-4 md:text-base">
                    <svg class="w-4 h-4 md:w-[18px] md:h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    <span class="hidden sm:inline">Aggiungi</span>
                </button>
            </div>
        </div>
        
        <!-- Tab Switcher - Mobile Responsive -->
        <div class="border-b border-gray-200">
            <div class="flex gap-1 overflow-x-auto hide-scrollbar pb-2 md:gap-3 md:overflow-visible">
                <button class="flex items-center gap-2 px-3 py-2 font-medium transition-colors border-b-2 whitespace-nowrap flex-shrink-0 text-sm md:text-base md:px-4 text-green-600 border-green-600">
                    <svg class="w-4 h-4 md:w-[18px] md:h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    <span class="hidden sm:inline">Operazioni</span>
                </button>
                <button class="flex items-center gap-2 px-3 py-2 font-medium transition-colors border-b-2 whitespace-nowrap flex-shrink-0 text-sm md:text-base md:px-4 text-gray-500 border-transparent hover:text-gray-700">
                    <svg class="w-4 h-4 md:w-[18px] md:h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span class="hidden sm:inline">Pianificazione</span>
                </button>
                <button class="flex items-center gap-2 px-3 py-2 font-medium transition-colors border-b-2 whitespace-nowrap flex-shrink-0 text-sm md:text-base md:px-4 text-gray-500 border-transparent hover:text-gray-700">
                    <svg class="w-4 h-4 md:w-[18px] md:h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <span class="hidden sm:inline">Monitoraggio</span>
                </button>
                <button class="flex items-center gap-2 px-3 py-2 font-medium transition-colors border-b-2 whitespace-nowrap flex-shrink-0 text-sm md:text-base md:px-4 text-gray-500 border-transparent hover:text-gray-700">
                    <svg class="w-4 h-4 md:w-[18px] md:h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
                    </svg>
                    <span class="hidden sm:inline">Piante & Vivaio</span>
                </button>
                <button class="flex items-center gap-2 px-3 py-2 font-medium transition-colors border-b-2 whitespace-nowrap flex-shrink-0 text-sm md:text-base md:px-4 text-gray-500 border-transparent hover:text-gray-700">
                    <svg class="w-4 h-4 md:w-[18px] md:h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                    <span class="hidden sm:inline">Conformità</span>
                </button>
                <button class="flex items-center gap-2 px-3 py-2 font-medium transition-colors border-b-2 whitespace-nowrap flex-shrink-0 text-sm md:text-base md:px-4 text-gray-500 border-transparent hover:text-gray-700">
                    <svg class="w-4 h-4 md:w-[18px] md:h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                    </svg>
                    <span class="hidden sm:inline">Analytics</span>
                </button>
                <button class="flex items-center gap-2 px-3 py-2 font-medium transition-colors border-b-2 whitespace-nowrap flex-shrink-0 text-sm md:text-base md:px-4 text-gray-500 border-transparent hover:text-gray-700">
                    <svg class="w-4 h-4 md:w-[18px] md:h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                    </svg>
                    <span class="hidden sm:inline">Struttura</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Simulated Professional Dashboard -->
    <main class="p-4">
        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <div class="flex flex-col gap-4 mb-4 md:flex-row md:items-center md:justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2 md:text-2xl md:gap-3">
                        <svg class="text-green-600 w-6 h-6 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        <span class="hidden sm:inline">Command Center Professionale</span>
                        <span class="sm:hidden">Dashboard Pro</span>
                    </h2>
                    <p class="text-gray-600 mt-1 text-sm md:text-base">
                        Piano operativo generato dal Director • 18/01/2026
                    </p>
                </div>
                
                <!-- Priority Badge - Mobile Responsive -->
                <div class="px-3 py-2 rounded-full border-2 border-green-500 bg-green-50 md:px-4 self-start md:self-auto">
                    <div class="flex items-center gap-2">
                        <svg class="text-green-600 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="font-semibold text-xs md:text-sm">
                            <span class="hidden sm:inline">Priorità: </span>
                            <span class="sm:hidden">P:</span>
                            Low
                        </span>
                    </div>
                </div>
            </div>

            <!-- KPI Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="text-center p-3 bg-red-50 rounded-lg border border-red-200">
                    <div class="text-lg font-bold text-red-600">0</div>
                    <div class="text-xs text-red-600">Allerte</div>
                </div>
                <div class="text-center p-3 bg-blue-50 rounded-lg border border-blue-200">
                    <div class="text-lg font-bold text-blue-600">3</div>
                    <div class="text-xs text-blue-600">Operazioni</div>
                </div>
                <div class="text-center p-3 bg-green-50 rounded-lg border border-green-200">
                    <div class="text-lg font-bold text-green-600">2</div>
                    <div class="text-xs text-green-600">Nutrizione</div>
                </div>
                <div class="text-center p-3 bg-purple-50 rounded-lg border border-purple-200">
                    <div class="text-lg font-bold text-purple-600">1</div>
                    <div class="text-xs text-purple-600">Salute</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Test Controls -->
    <div class="fixed bottom-4 left-4 bg-white border border-gray-300 rounded-lg p-4 shadow-lg">
        <h3 class="font-bold mb-2">Test Mobile Layout</h3>
        <div class="space-y-2">
            <button onclick="setViewport(375, 667)" class="block w-full text-left px-3 py-1 bg-blue-100 hover:bg-blue-200 rounded text-sm">iPhone SE (375x667)</button>
            <button onclick="setViewport(390, 844)" class="block w-full text-left px-3 py-1 bg-blue-100 hover:bg-blue-200 rounded text-sm">iPhone 12 (390x844)</button>
            <button onclick="setViewport(360, 800)" class="block w-full text-left px-3 py-1 bg-blue-100 hover:bg-blue-200 rounded text-sm">Galaxy S21 (360x800)</button>
            <button onclick="setViewport(768, 1024)" class="block w-full text-left px-3 py-1 bg-blue-100 hover:bg-blue-200 rounded text-sm">iPad Mini (768x1024)</button>
            <button onclick="setViewport(1920, 1080)" class="block w-full text-left px-3 py-1 bg-green-100 hover:bg-green-200 rounded text-sm">Desktop (1920x1080)</button>
        </div>
        <div class="mt-3 pt-3 border-t border-gray-200">
            <div class="text-xs text-gray-600">
                <div>Current: <span id="currentSize">Loading...</span></div>
                <div>Scroll Test: <span id="scrollTest">-</span></div>
            </div>
        </div>
    </div>

    <script>
        function updateViewportIndicator() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const indicator = document.getElementById('viewportIndicator');
            const currentSize = document.getElementById('currentSize');
            
            let deviceType = 'Desktop';
            if (width <= 480) deviceType = 'Mobile';
            else if (width <= 768) deviceType = 'Tablet';
            
            indicator.textContent = `${deviceType}: ${width}x${height}`;
            if (currentSize) currentSize.textContent = `${width}x${height}`;
            
            // Test horizontal scroll
            const tabContainer = document.querySelector('.overflow-x-auto');
            const scrollTest = document.getElementById('scrollTest');
            if (tabContainer && scrollTest) {
                const hasScroll = tabContainer.scrollWidth > tabContainer.clientWidth;
                scrollTest.textContent = hasScroll ? 'Scrollable ✅' : 'No scroll needed ✅';
            }
        }
        
        function setViewport(width, height) {
            // This is just for demonstration - in real browser dev tools you'd set the viewport
            alert(`Set browser dev tools to ${width}x${height} and refresh the page`);
        }
        
        // Update on load and resize
        window.addEventListener('load', updateViewportIndicator);
        window.addEventListener('resize', updateViewportIndicator);
        
        // Test tab scrolling
        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('header button');
            tabs.forEach((tab, index) => {
                tab.addEventListener('click', function() {
                    // Remove active class from all tabs
                    tabs.forEach(t => {
                        t.classList.remove('text-green-600', 'border-green-600');
                        t.classList.add('text-gray-500', 'border-transparent');
                    });
                    
                    // Add active class to clicked tab
                    this.classList.remove('text-gray-500', 'border-transparent');
                    this.classList.add('text-green-600', 'border-green-600');
                });
            });
        });
    </script>
</body>
</html>
