<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mobile Modals - OrtoMio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Simula il sistema di modal mobile-optimized */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .modal-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 95vw;
            max-height: 95vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            background: white;
            flex-shrink: 0;
        }
        
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .touch-target {
            min-height: 44px;
            touch-action: manipulation;
        }
        
        @media (min-width: 640px) {
            .modal-container {
                max-width: 28rem;
                max-height: 90vh;
            }
            
            .modal-backdrop {
                padding: 1.5rem;
            }
            
            .modal-header {
                padding: 1.5rem;
            }
        }
        
        /* Test specifici per problemi mobile */
        .test-result {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin: 0.5rem 0;
            font-size: 0.875rem;
        }
        
        .test-pass {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        
        .test-fail {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        .test-warning {
            background: #fefce8;
            color: #ca8a04;
            border: 1px solid #fde68a;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-4 max-w-4xl">
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h1 class="text-2xl font-bold text-gray-900 mb-4">
                📱 Test Mobile Modal Optimization
            </h1>
            <p class="text-gray-600 mb-6">
                Test per verificare che i modal siano ottimizzati per dispositivi mobili
            </p>
            
            <!-- Test Controls -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <button onclick="testStandardModal()" class="bg-blue-600 text-white p-3 rounded-lg touch-target">
                    Standard Modal
                </button>
                <button onclick="testBottomSheet()" class="bg-green-600 text-white p-3 rounded-lg touch-target">
                    Bottom Sheet
                </button>
                <button onclick="testConfirmDialog()" class="bg-red-600 text-white p-3 rounded-lg touch-target">
                    Confirm Dialog
                </button>
                <button onclick="runAllTests()" class="bg-purple-600 text-white p-3 rounded-lg touch-target">
                    Run All Tests
                </button>
            </div>
        </div>

        <!-- Test Results -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4">Test Results</h2>
            <div id="test-results">
                <p class="text-gray-500">Clicca "Run All Tests" per iniziare i test</p>
            </div>
        </div>
    </div>

    <!-- Modal Templates -->
    <div id="modal-container"></div>

    <script>
        // Test Suite per Modal Mobile
        class MobileModalTester {
            constructor() {
                this.results = []
                this.container = document.getElementById('modal-container')
                this.resultsContainer = document.getElementById('test-results')
            }

            // Test dimensioni responsive
            testResponsiveSize() {
                const modal = this.createTestModal()
                const rect = modal.getBoundingClientRect()
                
                const isMobile = window.innerWidth < 640
                const expectedMaxWidth = isMobile ? window.innerWidth * 0.95 : 448 // 28rem
                
                const pass = rect.width <= expectedMaxWidth
                
                this.addResult({
                    test: 'Responsive Size',
                    pass,
                    message: pass 
                        ? `✅ Modal width (${Math.round(rect.width)}px) is within expected range`
                        : `❌ Modal too wide: ${Math.round(rect.width)}px > ${expectedMaxWidth}px`
                })
                
                this.removeModal(modal)
                return pass
            }

            // Test touch targets
            testTouchTargets() {
                const modal = this.createTestModal()
                const buttons = modal.querySelectorAll('button')
                
                let allPass = true
                let failedButtons = 0
                
                buttons.forEach(button => {
                    const rect = button.getBoundingClientRect()
                    if (rect.height < 44) {
                        allPass = false
                        failedButtons++
                    }
                })
                
                this.addResult({
                    test: 'Touch Targets',
                    pass: allPass,
                    message: allPass
                        ? `✅ All ${buttons.length} buttons meet 44px minimum height`
                        : `❌ ${failedButtons}/${buttons.length} buttons are too small (<44px)`
                })
                
                this.removeModal(modal)
                return allPass
            }

            // Test z-index
            testZIndex() {
                const modal = this.createTestModal()
                const backdrop = modal.querySelector('.modal-backdrop')
                const zIndex = parseInt(window.getComputedStyle(backdrop).zIndex)
                
                const pass = zIndex >= 50
                
                this.addResult({
                    test: 'Z-Index',
                    pass,
                    message: pass
                        ? `✅ Modal z-index (${zIndex}) is sufficient`
                        : `❌ Modal z-index (${zIndex}) too low, should be ≥50`
                })
                
                this.removeModal(modal)
                return pass
            }

            // Test overflow handling
            testOverflow() {
                const modal = this.createTestModal(true) // Con contenuto lungo
                const content = modal.querySelector('.modal-content')
                const isScrollable = content.scrollHeight > content.clientHeight
                
                this.addResult({
                    test: 'Overflow Handling',
                    pass: isScrollable,
                    message: isScrollable
                        ? `✅ Modal content is scrollable when needed`
                        : `⚠️ Modal content overflow not tested (content fits)`
                })
                
                this.removeModal(modal)
                return true
            }

            // Test viewport safety
            testViewportSafety() {
                const modal = this.createTestModal()
                const modalRect = modal.getBoundingClientRect()
                
                const safeMargin = 16 // 1rem
                const fitsInViewport = 
                    modalRect.top >= safeMargin &&
                    modalRect.left >= safeMargin &&
                    modalRect.right <= window.innerWidth - safeMargin &&
                    modalRect.bottom <= window.innerHeight - safeMargin
                
                this.addResult({
                    test: 'Viewport Safety',
                    pass: fitsInViewport,
                    message: fitsInViewport
                        ? `✅ Modal fits safely within viewport`
                        : `❌ Modal extends outside safe viewport area`
                })
                
                this.removeModal(modal)
                return fitsInViewport
            }

            // Test performance
            testPerformance() {
                const startTime = performance.now()
                
                // Simula apertura/chiusura rapida
                for (let i = 0; i < 10; i++) {
                    const modal = this.createTestModal()
                    this.removeModal(modal)
                }
                
                const endTime = performance.now()
                const duration = endTime - startTime
                const pass = duration < 100 // Meno di 100ms per 10 operazioni
                
                this.addResult({
                    test: 'Performance',
                    pass,
                    message: pass
                        ? `✅ Modal operations completed in ${Math.round(duration)}ms`
                        : `⚠️ Modal operations took ${Math.round(duration)}ms (>100ms)`
                })
                
                return pass
            }

            // Crea modal di test
            createTestModal(longContent = false) {
                const modal = document.createElement('div')
                modal.innerHTML = `
                    <div class="modal-backdrop">
                        <div class="modal-container">
                            <div class="modal-header">
                                <div class="flex items-center justify-between">
                                    <h3 class="text-lg font-bold text-gray-900">Test Modal</h3>
                                    <button class="p-2 rounded-full hover:bg-gray-100 touch-target">
                                        <span class="text-gray-500">✕</span>
                                    </button>
                                </div>
                            </div>
                            <div class="modal-content">
                                <p class="text-gray-700 mb-4">Questo è un modal di test per verificare l'ottimizzazione mobile.</p>
                                ${longContent ? this.generateLongContent() : ''}
                                <div class="flex gap-3 mt-6">
                                    <button class="flex-1 p-3 border border-gray-300 rounded-lg touch-target">
                                        Annulla
                                    </button>
                                    <button class="flex-1 p-3 bg-blue-600 text-white rounded-lg touch-target">
                                        Conferma
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `
                
                this.container.appendChild(modal)
                return modal
            }

            // Genera contenuto lungo per test overflow
            generateLongContent() {
                let content = '<div class="space-y-4">'
                for (let i = 1; i <= 20; i++) {
                    content += `<p class="text-gray-600">Paragrafo di test numero ${i}. Questo contenuto è lungo per testare il comportamento dello scroll nel modal.</p>`
                }
                content += '</div>'
                return content
            }

            // Rimuovi modal
            removeModal(modal) {
                if (modal && modal.parentNode) {
                    modal.parentNode.removeChild(modal)
                }
            }

            // Aggiungi risultato test
            addResult(result) {
                this.results.push(result)
                this.updateResultsDisplay()
            }

            // Aggiorna display risultati
            updateResultsDisplay() {
                const passCount = this.results.filter(r => r.pass).length
                const totalCount = this.results.length
                
                let html = `
                    <div class="mb-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                        <h3 class="font-semibold text-blue-900">Test Summary</h3>
                        <p class="text-blue-700">Passed: ${passCount}/${totalCount} tests</p>
                        <div class="w-full bg-blue-200 rounded-full h-2 mt-2">
                            <div class="bg-blue-600 h-2 rounded-full transition-all" style="width: ${(passCount/totalCount)*100}%"></div>
                        </div>
                    </div>
                `
                
                this.results.forEach(result => {
                    const className = result.pass ? 'test-pass' : 'test-fail'
                    html += `
                        <div class="${className}">
                            <strong>${result.test}:</strong> ${result.message}
                        </div>
                    `
                })
                
                this.resultsContainer.innerHTML = html
            }

            // Esegui tutti i test
            runAllTests() {
                this.results = []
                this.resultsContainer.innerHTML = '<p class="text-gray-500">Running tests...</p>'
                
                setTimeout(() => {
                    this.testResponsiveSize()
                    this.testTouchTargets()
                    this.testZIndex()
                    this.testOverflow()
                    this.testViewportSafety()
                    this.testPerformance()
                    
                    const passCount = this.results.filter(r => r.pass).length
                    const totalCount = this.results.length
                    
                    console.log(`Mobile Modal Tests: ${passCount}/${totalCount} passed`)
                }, 100)
            }
        }

        // Inizializza tester
        const tester = new MobileModalTester()

        // Funzioni globali per i bottoni
        function testStandardModal() {
            const modal = tester.createTestModal()
            setTimeout(() => tester.removeModal(modal), 3000)
        }

        function testBottomSheet() {
            const modal = tester.createTestModal()
            const container = modal.querySelector('.modal-container')
            container.style.borderRadius = '1rem 1rem 0 0'
            
            const backdrop = modal.querySelector('.modal-backdrop')
            backdrop.style.alignItems = 'flex-end'
            backdrop.style.paddingBottom = '1rem'
            
            setTimeout(() => tester.removeModal(modal), 3000)
        }

        function testConfirmDialog() {
            const modal = document.createElement('div')
            modal.innerHTML = `
                <div class="modal-backdrop">
                    <div class="modal-container" style="max-width: 20rem">
                        <div class="modal-header">
                            <h3 class="text-lg font-bold text-gray-900">Conferma Azione</h3>
                        </div>
                        <div class="modal-content">
                            <p class="text-gray-700 mb-6">Sei sicuro di voler procedere?</p>
                            <div class="flex flex-col gap-3">
                                <button class="p-3 border border-gray-300 rounded-lg touch-target">
                                    Annulla
                                </button>
                                <button class="p-3 bg-red-600 text-white rounded-lg touch-target">
                                    Elimina
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `
            
            tester.container.appendChild(modal)
            setTimeout(() => tester.removeModal(modal), 3000)
        }

        function runAllTests() {
            tester.runAllTests()
        }

        // Auto-run tests on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                console.log('🚀 Running mobile modal tests...')
                runAllTests()
            }, 1000)
        })
    </script>
</body>
</html>
